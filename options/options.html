<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Textly — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="card">
      <h1>✦ Textly</h1>
      <p>
        Enter your OpenAI API key below. It is stored locally in your browser
        and only ever sent directly to OpenAI — never to any third party.
      </p>

      <label for="key">OpenAI API Key</label>
      <input type="password" id="key" placeholder="sk-..." />

      <button id="save">Save Key</button>
      <div class="status" id="status"></div>

      <div class="hint">
        Get your key at
        <a href="https://platform.openai.com/api-keys" target="_blank">
          platform.openai.com/api-keys
        </a>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
