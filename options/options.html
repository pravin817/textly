<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Textly — Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #2a2a3e;
        border: 1px solid #3b3b52;
        border-radius: 16px;
        padding: 36px;
        width: 420px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 6px;
      }

      p {
        font-size: 13px;
        color: #888;
        margin-bottom: 24px;
        line-height: 1.5;
      }

      label {
        font-size: 13px;
        color: #a0a0c0;
        display: block;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        background: #1e1e2e;
        border: 1px solid #44446a;
        border-radius: 8px;
        padding: 10px 14px;
        color: #cdd6f4;
        font-size: 14px;
        margin-bottom: 16px;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus {
        border-color: #6c63ff;
      }

      button {
        width: 100%;
        background: #6c63ff;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 11px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover {
        background: #5a52e0;
      }

      .status {
        margin-top: 14px;
        font-size: 13px;
        text-align: center;
        min-height: 20px;
      }

      .hint {
        margin-top: 20px;
        font-size: 12px;
        color: #555;
        text-align: center;
      }

      .hint a {
        color: #6c63ff;
        text-decoration: none;
      }
      .hint a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>✦ Textly</h1>
      <p>
        Enter your OpenAI API key below. It is stored locally in your browser
        and only ever sent directly to OpenAI — never to any third party.
      </p>

      <label for="key">OpenAI API Key</label>
      <input type="password" id="key" placeholder="sk-..." />

      <button id="save">Save Key</button>
      <div class="status" id="status"></div>

      <div class="hint">
        Get your key at
        <a href="https://platform.openai.com/api-keys" target="_blank">
          platform.openai.com/api-keys
        </a>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
